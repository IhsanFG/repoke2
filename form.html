<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form HTML</title>
</head>
<body>
 <h1>Buat Account Baru</h1>
    <h4>Sign Up Form</h4>
    <form action="selamat1.html" method="get">
        <p>Frist name :</p>
        
        <input type="text" id="username" name="username" required><br><br>
        
        <p>Last name</p>
        <label for="password">Password:</label>
        
        <div class="gender">
            <label>Gender</label><br>
            <input type="radio" id="male" name="gender" value="Male">
            <label for="male">Male</label><br>
            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label>
        </div>
        
        <label for="nationality">Nationality</label>
        <select id="nationality" name="nationality">
            <option value="Indonesia">Indonesia</option>
            <option value="Malaysia">Malaysia</option>
            <option value="Singapore">Singapore</option>
            <option value="Thailand">Thailand</option>
        </select><br>

        <div class="language">
            <label>Language Spoken</label><br>
            <input type="checkbox" id="bahasa_indonesia" name="language" value="Bahasa Indonesia">
            <label for="bahasa_indonesia">Bahasa Indonesia</label><br>
            <input type="checkbox" id="english" name="language" value="English">
            <label for="english">English</label><br>
            <input type="checkbox" id="other" name="language" value="Other">
            <label for="other">Other</label>
        </div>

        <label for="bio">Bio</label><br>
        <textarea id="bio" name="bio"></textarea><br>

        <input type="submit" value="Sign Up">
    </form>
</body>
</html>
